version = 1
name = "cp"

[setup]
script = ""

[[actions]]
name = "Build and Install kcp"
icon = "tool"
command = "bash -lc 'set -euo pipefail; if [ ! -f build/CMakeCache.txt ]; then cmake -S . -B build -G Ninja; else cmake -S . -B build; fi; cmake --build build --target cp -j \"$(nproc)\"; install -Dm755 build/compiler/cp \"$HOME/.local/bin/kcp\"; install -Dm644 build/runtime/libcp_runtime.a \"$HOME/.local/lib/kcp/libcp_runtime.a\"; rm -rf \"$HOME/.local/share/kcp/std\"; mkdir -p \"$HOME/.local/share/kcp\"; cp -a std \"$HOME/.local/share/kcp/std\"; \"$HOME/.local/bin/kcp\" --help'"

[[actions]]
name = "Build and Install CLion Plugin"
icon = "tool"
command = "bash .codex/scripts/build-install-clion-plugin.sh"

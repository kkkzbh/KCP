name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string
      publishMarketplace:
        description: "Publish the CLion plugin to JetBrains Marketplace"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

jobs:
  linux-packages:
    name: Linux packages
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install build dependencies
        run: |
          dnf -y update
          dnf -y install \
            clang \
            cmake \
            dpkg \
            findutils \
            gcc-c++ \
            git \
            gzip \
            libffi-devel \
            libstdc++-devel \
            libxml2-devel \
            llvm-devel \
            ninja-build \
            rpm-build \
            tar \
            which \
            zlib-devel \
            zstd

      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Configure KCP release build
        run: |
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCP_DEFAULT_RUNTIME_LIBRARY_PATH=/usr/lib/kcp/libcp_runtime.a \
            -DCP_DEFAULT_STDLIB_ROOT_PATH=/usr/lib/kcp/std

      - name: Build KCP
        run: cmake --build build-release --target kcp -j2

      - name: Build Linux packages
        run: |
          chmod +x scripts/package-linux.sh
          scripts/package-linux.sh \
            --build-dir build-release \
            --version "${{ steps.version.outputs.version }}" \
            --out-dir dist/release

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kcp-linux-packages
          path: dist/release/*
          if-no-files-found: error

  clion-plugin:
    name: CLion plugin
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8

    steps:
      - name: Install plugin build dependencies
        run: |
          dnf -y update
          dnf -y install \
            clang \
            cmake \
            findutils \
            gcc-c++ \
            git \
            glibc-langpack-en \
            java-25-openjdk-devel \
            libffi-devel \
            libxml2-devel \
            llvm-devel \
            ninja-build \
            unzip \
            which \
            zlib-devel

      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build plugin ZIP
        working-directory: clion-plugin
        run: |
          ./gradlew buildPlugin \
            -PpluginVersion="${{ steps.version.outputs.version }}" \
            -PjavaToolchainVersion=25 \
            -PclionLocalPath=

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcp-clion-plugin
          path: clion-plugin/build/distributions/*.zip
          if-no-files-found: error

      - name: Publish plugin to JetBrains Marketplace
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && inputs.publishMarketplace) }}
        working-directory: clion-plugin
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          if [[ -z "${JETBRAINS_MARKETPLACE_TOKEN}" ]]; then
            echo "JETBRAINS_MARKETPLACE_TOKEN is not configured; skipping Marketplace publish."
            exit 0
          fi
          ./gradlew publishPlugin \
            -PpluginVersion="${{ steps.version.outputs.version }}" \
            -PjavaToolchainVersion=25 \
            -PclionLocalPath=

  windows-packages:
    name: Windows packages
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install build dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            zip
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-libffi
            mingw-w64-clang-x86_64-libxml2
            mingw-w64-clang-x86_64-llvm
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-zlib

      - name: Configure KCP release build
        shell: msys2 {0}
        run: |
          cmake -S . -B build-windows -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=/clang64/bin/clang.exe \
            -DCMAKE_CXX_COMPILER=/clang64/bin/clang++.exe \
            -DLLVM_DIR=/clang64/lib/cmake/llvm \
            -DCP_DEFAULT_RUNTIME_LIBRARY_PATH= \
            -DCP_DEFAULT_STDLIB_ROOT_PATH=

      - name: Build KCP
        shell: msys2 {0}
        run: cmake --build build-windows --target kcp -j2

      - name: Package Windows ZIP
        shell: msys2 {0}
        run: |
          version="${{ steps.version.outputs.version }}"
          root="dist/windows/kcp-$version-windows-x86_64"
          mkdir -p "$root/bin" "$root/lib/kcp"
          cp build-windows/compiler/kcp.exe "$root/bin/kcp.exe"
          cp build-windows/runtime/libcp_runtime.a "$root/lib/kcp/libcp_runtime.a"
          cp -R std "$root/lib/kcp/std"
          ldd "$root/bin/kcp.exe" \
            | awk '/\/clang64\// { print $3 }' \
            | sort -u \
            | xargs -r -I{} cp -n "{}" "$root/bin/"
          cat > "$root/README.txt" <<EOF
          KCP $version for Windows x86_64

          Install MSYS2, open the CLANG64 shell, and install clang:
              pacman -S --needed mingw-w64-clang-x86_64-clang

          Add this package's bin directory and C:\msys64\clang64\bin to PATH.
          Then run kcp from PowerShell, cmd, or the CLANG64 shell.
          EOF
          (cd dist/windows && zip -r "kcp-$version-windows-x86_64.zip" "kcp-$version-windows-x86_64")

      - name: Smoke test Windows package
        shell: msys2 {0}
        run: |
          version="${{ steps.version.outputs.version }}"
          package="dist/windows/kcp-$version-windows-x86_64"
          export PATH="$PWD/$package/bin:$PATH"
          "$package/bin/kcp.exe" --help
          cat > hello.cp <<'EOF'
          main() -> i32
          {
              return 0;
          }
          EOF
          "$package/bin/kcp.exe" hello.cp -o hello.exe --verbose
          ./hello.exe

      - name: Upload Windows package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kcp-windows-packages
          path: dist/windows/*.zip
          if-no-files-found: error

  github-release:
    name: GitHub release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    needs:
      - linux-packages
      - clion-plugin
      - windows-packages
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/github-release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/github-release/*
          generate_release_notes: true

  fedora-repository:
    name: Fedora repository
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    needs:
      - linux-packages
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: kcp-linux-packages
          path: dist/linux-packages

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c

      - name: Publish Fedora repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "https://github.com/${GITHUB_REPOSITORY}.git" pages
          else
            mkdir pages
            git -C pages init
            git -C pages checkout -b gh-pages
          fi

          git -C pages remote remove origin >/dev/null 2>&1 || true
          git -C pages remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p "pages/fedora/${VERSION}"
          cp dist/linux-packages/*.rpm "pages/fedora/${VERSION}/"
          createrepo_c "pages/fedora/${VERSION}"

          rm -rf pages/fedora/latest
          mkdir -p pages/fedora
          cp -a "pages/fedora/${VERSION}" pages/fedora/latest
          touch pages/.nojekyll

          git -C pages add .nojekyll fedora
          if git -C pages diff --cached --quiet; then
            echo "Fedora repository is already current."
            exit 0
          fi
          git -C pages commit -m "release: publish Fedora repository ${VERSION}"
          git -C pages push origin gh-pages
